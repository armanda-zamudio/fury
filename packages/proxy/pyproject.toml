[project]
name = "proxy"
version = "0.1.0"
description = "Add your description here"
authors = [
]
requires-python = ">=3.14"
dependencies = [
    "aiolimiter>=1.2.1",
    "ih",
    "pillow>=11.2.1",
    "requests==2.32.5",
    "python-dynamodb-lock>=0.9.1",
    "pynamodb>=6.1.0",
    "pyyaml>=6.0.2",
    "smart-open>=7.1.0",
    "svcs>=25.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
ih = { workspace = true }

[dependency-groups]
dev = [
    "boto3-stubs[cloudformation,events,scheduler,sqs]>=1.37.9",
]
docker = [
    "awslambdaric>=3.1.1",
]
